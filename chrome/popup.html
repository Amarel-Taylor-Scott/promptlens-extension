<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=360">
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <header>
    <div class="logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="10.5" cy="10.5" r="7.5"/>
        <line x1="16.2" y1="16.2" x2="22" y2="22"/>
      </svg>
      <span>PromptLens</span>
    </div>
    <button id="settings-btn" title="Settings">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </header>

  <!-- Status bar -->
  <div id="status-bar" class="status-bar">
    <div class="status-info">
      <span id="auth-label">Anonymous</span>
      <span id="limit-label" class="limit-label"></span>
    </div>
    <div class="progress-track" id="progress-track" hidden>
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </div>

  <!-- Empty state -->
  <section id="empty-state" class="empty-state" hidden>
    <div class="empty-icon">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#d1d5db" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
    </div>
    <p class="empty-title">No generations yet</p>
    <p class="empty-hint">Right-click any image and choose<br><strong>Generate Prompt with PromptLens</strong></p>
  </section>

  <!-- History -->
  <section id="history-section" hidden>
    <div class="section-header">
      <h3>Recent</h3>
      <button id="clear-btn" title="Clear history">&times;</button>
    </div>
    <ul id="history-list"></ul>
  </section>

  <!-- Upsell (shown for anonymous/email users) -->
  <div id="upsell" class="upsell" hidden>
    <span id="upsell-text"></span>
  </div>

  <footer>
    <a id="open-site" href="#" class="footer-link">Open PromptLens</a>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
